<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traduttore</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');

  
  :root {
    --bg: #fafafa;
    --surface: #f4f1fb;
    --border: #cfc0f0;
    --border-active: #7c3aed;
    --accent: #5b21b6;
    --accent-light: #7c3aed;
    --accent-dim: rgba(91,33,182,0.06);
    --accent-glow: rgba(91,33,182,0.12);
    --text: #12062a;
    --text-dim: #7a6e90;
    --text-mid: #4a3f6b;
    --error: #dc2626;
    --success: #059669;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Inter', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* ── EMOJI BACKGROUND ── */
  .emoji-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .emoji-float {
    position: absolute;
    opacity: 0.07;
    animation: floatAround linear infinite;
    user-select: none;
    line-height: 1;
  }

  @keyframes floatAround {
    0%   { transform: translateY(0px) rotate(0deg); }
    33%  { transform: translateY(-16px) rotate(5deg); }
    66%  { transform: translateY(-8px) rotate(-4deg); }
    100% { transform: translateY(0px) rotate(0deg); }
  }

  /* ── CONTAINER ── */
  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
  }

  /* ── HEADER ── */
  .header {
    text-align: left;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .header-left h1 {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.01em;
  }

  .header-left p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    font-weight: 400;
    letter-spacing: 0.04em;
    font-family: var(--sans);
  }

  .header-right {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── LOGIN ── */
  #login-screen {
    opacity: 0;
    animation: fadeUp 0.5s ease 0.15s forwards;
  }

  .login-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 2px 16px var(--accent-dim);
  }

  .login-card .lock-emoji {
    font-size: 32px;
    display: block;
    margin-bottom: 16px;
    opacity: 0.7;
  }

  .login-card h2 {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .login-card p {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 24px;
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .login-row {
    display: flex;
    border: 1px solid var(--border);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .login-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .pw-input {
    flex: 1;
    background: white;
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 13px 16px;
    outline: none;
    letter-spacing: 0.1em;
  }

  .pw-input.error { background: #fff8f8; }

  .pw-btn {
    background: var(--accent);
    border: none;
    color: white;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 13px 22px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .pw-btn:hover { background: var(--accent-light); }

  .login-error {
    font-size: 11px;
    font-weight: 500;
    color: var(--error);
    margin-top: 10px;
    opacity: 0;
    transition: opacity 0.2s;
    letter-spacing: 0.02em;
  }

  .login-error.visible { opacity: 1; }

  /* ── APP SCREEN ── */
  #app-screen { display: none; opacity: 0; }

  #app-screen.visible {
    display: block;
    animation: fadeUp 0.4s ease forwards;
  }

  /* ── VOCAB STATUS ── */
  .vocab-status {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .vocab-status .indicator {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }

  .vocab-status.loaded .indicator {
    background: var(--success);
  }

  .vocab-status.loading .indicator {
    background: var(--accent);
    animation: pulse 1s infinite;
  }

  .vocab-status .refresh-btn {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: opacity 0.15s;
    text-transform: uppercase;
  }

  .vocab-status .refresh-btn:hover { opacity: 0.6; }

  /* ── PANELS ── */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    margin-bottom: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .panel {
    background: white;
    transition: background 0.2s;
  }

  .panel:focus-within {
    background: #fdfbff;
  }

  .panel-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 11px 16px 9px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: var(--sans);
  }

  .panel-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ddd;
    transition: all 0.3s;
  }

  .panel-label .dot.active {
    background: var(--accent);
  }

  textarea {
    width: 100%;
    min-height: 220px;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.75;
    padding: 16px;
    resize: vertical;
    outline: none;
  }

  textarea::placeholder { color: #bbb; font-style: italic; }

  #output-text { color: var(--text-mid); cursor: default; }
  #output-text.has-content { color: var(--text); }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-top: none;
    margin-bottom: 16px;
  }

  .btn-translate {
    flex: 1;
    background: var(--accent);
    border: none;
    color: white;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 14px 24px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-translate:hover { background: var(--accent-light); }
  .btn-translate:active { opacity: 0.9; }

  .btn-secondary {
    background: white;
    border: none;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 14px 20px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-secondary:hover { color: var(--accent); background: var(--surface); }
  .btn-secondary.copied { color: var(--success); }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    border: 1px solid var(--border);
    background: var(--border);
    gap: 1px;
  }

  .stat {
    flex: 1;
    padding: 12px 16px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .stat-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: var(--sans);
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--accent);
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 20px;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--sans);
    letter-spacing: 0.03em;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .highlight-flash { animation: flashBg 0.4s ease; }

  @keyframes flashBg {
    0%   { background: var(--accent-dim); }
    100% { background: white; }
  }

  @media (max-width: 560px) {
    .panels { grid-template-columns: 1fr; }
    .header { flex-direction: column; gap: 4px; }
    .header-left h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div class="emoji-bg" id="emoji-bg"></div>

<div class="container">

  <div class="header">
    <div class="header-left">
      <h1>Traduttore</h1>
      <p>vocabolario dinamico.</p>
    </div>
    <div class="header-right">v1.0</div>
  </div>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-card">
      <span class="lock-emoji">🔐</span>
      <h2>Accesso richiesto</h2>
      <p>Inserisci la password per continuare</p>
      <div class="login-row">
        <input
          class="pw-input"
          id="pw-input"
          type="password"
          placeholder="password…"
          autocomplete="current-password"
        />
        <button class="pw-btn" onclick="checkPassword()">Entra →</button>
      </div>
      <div class="login-error" id="login-error">❌ Password errata, riprova</div>
    </div>
  </div>

  <!-- APP -->
  <div id="app-screen">

    <div class="vocab-status loading" id="vocab-status">
      <div class="indicator"></div>
      <span id="vocab-status-text">Caricamento vocabolario…</span>
      <button class="refresh-btn" onclick="loadVocabulary()">↻ Aggiorna</button>
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-label">
          Input
          <div class="dot active"></div>
        </div>
        <textarea
          id="input-text"
          placeholder="Scrivi o incolla il testo da tradurre…"
        ></textarea>
      </div>
      <div class="panel">
        <div class="panel-label">
          Output
          <div class="dot" id="output-dot"></div>
        </div>
        <textarea
          id="output-text"
          readonly
          placeholder="Il testo tradotto apparirà qui…"
        ></textarea>
      </div>
    </div>

    <div class="controls">
      <button class="btn-translate" onclick="translate()">Traduci</button>
      <button class="btn-secondary" id="copy-btn" onclick="copyOutput()">Copia</button>
      <button class="btn-secondary" onclick="clearAll()">Pulisci</button>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">Termini vocabolario</span>
        <span class="stat-value" id="stat-vocab">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Sostituzioni</span>
        <span class="stat-value" id="stat-replacements">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Caratteri output</span>
        <span class="stat-value" id="stat-chars">—</span>
      </div>
    </div>

    <div class="footer">
      <span id="last-update">vocabolario non caricato</span>
      <span>La Abba 💜</span>
    </div>

  </div>

</div>

<script>
  // ─────────────────────────────────────────
  const PASSWORD = 'Portogallo2024';
  const VOCAB_WEBHOOK_URL = 'https://script.google.com/a/macros/digitalrealitylab.it/s/AKfycbzFrIJmmhwvoQMa-nVJvbkszrh8KFt-EIUo6X1W0oOzuJaZkV_D7uZhR3ndscv-PI7Fdg/exec';
  const ESEMPIO_VOCABOLARIO = [
    { source: '🔴', target: 'URGENTE' },
    { source: '🟡', target: 'IN ATTESA' },
    { source: '🟢', target: 'COMPLETATO' },
    { source: 'cliente', target: 'client' },
    { source: 'riunione', target: 'meeting' },
  ];
  // ─────────────────────────────────────────

  // ── EMOJI BACKGROUND ──
  const EMOJIS = [
    '🪐','🌍','🌎','🌏','🌙','🌛','🌜','🌝','🌚','🌞','⭐','🌟',
    '✨','💫','🌠','☄️','🚀','🛸','🛰️','🔭','🌌','🪨','⚡','🌤️',
    '🍕','🍣','🍜','🍔','🥑','🍩','🧁','🍦','🫐','🍇','🍓','🌮',
    '🍱','🍛','🥘','🫕','🍲','🥗','🍤','🧆','🥙','🍋','🫙','🍾'
  ];

  function spawnEmojis() {
    const container = document.getElementById('emoji-bg');
    for (let i = 0; i < 42; i++) {
      const el = document.createElement('span');
      el.className = 'emoji-float';
      el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = Math.random() * 100 + 'vh';
      el.style.fontSize = (16 + Math.random() * 22) + 'px';
      el.style.animationDuration = (7 + Math.random() * 10) + 's';
      el.style.animationDelay = (-Math.random() * 12) + 's';
      container.appendChild(el);
    }
  }
  spawnEmojis();

  let vocabulary = [];
  let isAuthenticated = false;

  function checkPassword() {
    const input = document.getElementById('pw-input');
    const errorEl = document.getElementById('login-error');
    if (input.value === PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      const app = document.getElementById('app-screen');
      app.classList.add('visible');
      isAuthenticated = true;
      loadVocabulary();
    } else {
      input.classList.add('error');
      errorEl.classList.add('visible');
      input.value = '';
      setTimeout(() => input.classList.remove('error'), 600);
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
    document.getElementById('login-error').classList.remove('visible');
    document.getElementById('pw-input').classList.remove('error');
  });

  async function loadVocabulary() {
    const statusEl = document.getElementById('vocab-status');
    const statusText = document.getElementById('vocab-status-text');
    const statVocab = document.getElementById('stat-vocab');
    const lastUpdate = document.getElementById('last-update');

    statusEl.className = 'vocab-status loading';
    statusText.textContent = 'Caricamento vocabolario…';

    try {
      // CORS proxy per aggirare le restrizioni di Google Apps Script
      const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(VOCAB_WEBHOOK_URL);
      const res = await fetch(proxyUrl);
      const data = await res.json();
      vocabulary = data;
      statusEl.className = 'vocab-status loaded';
      statusText.textContent = `${vocabulary.length} termini caricati`;
      statVocab.textContent = vocabulary.length;
      lastUpdate.textContent = 'aggiornato: ' + now();
    } catch (err) {
      vocabulary = ESEMPIO_VOCABOLARIO;
      statusEl.className = 'vocab-status loaded';
      statusText.textContent = `${vocabulary.length} termini (esempio locale)`;
      statVocab.textContent = vocabulary.length;
      lastUpdate.textContent = 'aggiornato: ' + now();
      console.warn('Fallback al vocabolario esempio', err);
    }
  }

  function translate() {
    const input = document.getElementById('input-text').value;
    if (!input.trim()) return;

    let output = input;
    let count = 0;

    const sorted = [...vocabulary].sort((a, b) => b.source.length - a.source.length);
    sorted.forEach(({ source, target }) => {
      if (!source) return;
      const escaped = source.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const regex = new RegExp(escaped, 'g');
      const matches = (output.match(regex) || []).length;
      if (matches > 0) {
        output = output.replace(regex, target);
        count += matches;
      }
    });

    const outputEl = document.getElementById('output-text');
    outputEl.value = output;
    outputEl.classList.add('has-content');
    outputEl.classList.add('highlight-flash');
    setTimeout(() => outputEl.classList.remove('highlight-flash'), 500);
    document.getElementById('output-dot').classList.add('active');
    document.getElementById('stat-replacements').textContent = count;
    document.getElementById('stat-chars').textContent = output.length;
  }

  function copyOutput() {
    const output = document.getElementById('output-text').value;
    if (!output) return;
    navigator.clipboard.writeText(output).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copiato ✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copia';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function clearAll() {
    document.getElementById('input-text').value = '';
    document.getElementById('output-text').value = '';
    document.getElementById('output-text').classList.remove('has-content');
    document.getElementById('output-dot').classList.remove('active');
    document.getElementById('stat-replacements').textContent = '—';
    document.getElementById('stat-chars').textContent = '—';
  }

  function now() {
    return new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !isAuthenticated) checkPassword();
  });
</script>
</body>
</html>
